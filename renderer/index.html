<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Launcher</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header">
    <span id="title">Games</span>
    <span id="clock"></span>
  </div>

  <div id="grid-container">
    <div id="grid"></div>
  </div>

  <div id="hints" class="gamepad-hidden">
    <span class="hint"><span class="btn btn-cross">A</span> Direct</span>
    <span class="hint"><span class="btn btn-triangle">Y</span> Steam</span>
    <span class="hint"><span class="btn btn-dpad">D-pad</span> Navigate</span>
    <span class="hint"><span class="btn btn-start">Start</span> Quit</span>
  </div>

  <div id="launch-overlay" class="hidden">
    <div id="launch-box">
      <div id="launch-name"></div>
      <div id="launch-sub">Launching...</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
